name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/shreyansh-cicd:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/shreyansh-cicd:latest  
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            sudo docker pull 22shreyansh/shreyansh-cicd:latest

            sudo docker stop shreyansh-cicd || true
            sudo docker rm shreyansh-cicd || true

            sudo docker run -d \
              --name shreyansh-cicd \
              -p 9000:80 \
              22shreyansh/shreyansh-cicd:latest

